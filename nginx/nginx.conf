events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # SSL configuration (for production)
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    upstream app_server {
        server app:8000 fail_timeout=0;
    }

    server {
        listen 80;
        server_name yourdomain.uz www.yourdomain.uz;

        # Redirect to HTTPS (uncomment in production)
        # return 301 https://$server_name$request_uri;

        # Static files
        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Media files
        location /media/ {
            alias /media/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Certificates (protected)
        location /certificates/ {
            internal;
            alias /certificates/;
        }

        # Main application
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_buffering off;

            proxy_pass http://app_server;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }

    # HTTPS server (uncomment in production)
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.uz www.yourdomain.uz;
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.uz/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.uz/privkey.pem;
    #
    #     # Static files
    #     location /static/ {
    #         alias /static/;
    #         expires 30d;
    #         add_header Cache-Control "public, no-transform";
    #     }
