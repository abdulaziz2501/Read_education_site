{% extends "base.html" %}

{% block title %}500 - Server Error - {{ super() }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center space-y-8" data-aos="zoom-in">
        <div>
            <h1 class="text-9xl font-extrabold text-red-600 tracking-widest">500</h1>
            <div class="bg-red-600 text-white px-2 text-sm rounded -rotate-12 absolute -mt-[3] ml-[100px]">
                Server Error
            </div>
        </div>

        <h2 class="mt-6 text-3xl font-bold text-gray-900">Internal Server Error</h2>

        <p class="mt-2 text-lg text-gray-600">
            Something went wrong on our end. We're working to fix it. Please try again later.
        </p>

        <div class="mt-8 flex justify-center gap-4">
            <button onclick="window.location.reload()"
                class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition duration-300">
                <i class="fas fa-redo mr-2"></i> Try Again
            </button>
            <a href="/"
                class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300">
                <i class="fas fa-home mr-2"></i> Go to Homepage
            </a>
        </div>
    </div>
</div>
{% endblock %}
