<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate | READ EDUCATION</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        dark: '#0F172A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body
    class="bg-slate-50 text-slate-800 antialiased font-sans min-h-screen flex flex-col selection:bg-primary selection:text-white">

    <!-- Simple Nav -->
    <nav class="w-full bg-white border-b border-slate-200 py-4">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 cursor-pointer group">
                <i class="ph ph-arrow-left text-xl text-slate-400 group-hover:text-primary transition-colors"></i>
                <span class="font-medium text-slate-600 group-hover:text-primary transition-colors">Back to Home</span>
            </a>
            <div class="flex items-center gap-2">
                <div class="flex-shrink-0 flex items-center gap-3 cursor-pointer">
                    <img src="/static/images/logo.png" class="h-14 w-auto object-contain" alt="READ EDUCATION Logo">

                </div>
            </div>
        </div>
    </nav>

    <!-- Verification Section -->
    <main class="flex-grow flex items-center justify-center p-4 relative overflow-hidden">
        <!-- Background light effect -->
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-blue-100 rounded-full blur-[100px] -z-10 opacity-60">
        </div>

        <div
            class="w-full max-w-md bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-white/50 animate-slide-up relative">
            <div
                class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-primary shadow-inner">
                <i class="ph ph-shield-check text-3xl"></i>
            </div>
            <h1 class="text-2xl font-heading font-bold text-center text-dark mb-2">Verify Certificate</h1>
            <p class="text-center text-slate-500 mb-8 text-sm">Enter the unique Certificate ID to verify its
                authenticity in our database.</p>

            <form id="verifyForm" class="space-y-6">
                <div>
                    <label for="certificateId" class="block text-sm font-medium text-slate-700 mb-2">Certificate
                        ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-hash text-slate-400"></i>
                        </div>
                        <input type="text" id="certificateId" name="certificateId" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 bg-white/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm font-medium uppercase placeholder-slate-400 focus:bg-white"
                            placeholder="e.g. RE-2025-001">
                    </div>
                </div>

                <button type="submit" id="verifyBtn"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-primary hover:bg-blue-800 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all relative overflow-hidden group">
                    <span class="relative z-10 flex items-center gap-2">Verify Certificate <i
                            class="ph ph-arrow-right group-hover:translate-x-1 transition-transform"></i></span>
                </button>
            </form>

            <div id="errorMsg"
                class="mt-4 p-4 bg-red-50 text-red-700 rounded-xl border border-red-100 hidden text-sm flex items-center gap-2">
                <i class="ph ph-warning-circle text-lg"></i>
                <span id="errorText"></span>
            </div>

            <div
                class="mt-8 pt-6 border-t border-slate-100 text-center flex items-center justify-center gap-2 text-xs text-slate-400">
                <i class="ph-fill ph-lock-key text-slate-300"></i> Secure verification connected to official registry
            </div>
        </div>
    </main>

    <script>
        document.getElementById('verifyForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const certId = document.getElementById('certificateId').value.trim();
            if (certId) {
                // Since this goes to backend logic we can just route to the certificate URL endpoint
                window.location.href = `/certificate/${certId}`;
            }
        });
    </script>
</body>

</html>
