<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | READ EDUCATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center font-['Inter']">
    <div class="max-w-md w-full p-8 bg-white rounded-2xl shadow-xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800 font-['Outfit'] mb-2">Xush kelibsiz</h1>
            <p class="text-slate-500">READ EDUCATION tizimiga kirish</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Foydalanuvchi nomi</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Parol</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>

            <button type="submit"
                class="w-full py-4 bg-primary text-white rounded-xl font-semibold hover:bg-blue-800 transition-all shadow-lg">Kirish</button>
        </form>

        <div id="errorMessage"
            class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center font-medium border border-red-100">
        </div>

        <div class="mt-8 text-center text-slate-500 text-sm">
            <a href="/" class="hover:text-primary transition-colors">← Asosiy sahifaga qaytish</a>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        // Check if already logged in
        auth.checkAuthAndRedirect();

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData // OAuth2PasswordRequestForm expects multipart/form-data
                });

                if (response.ok) {
                    const data = await response.json();
                    auth.setToken(data.access_token);
                    await auth.checkAuthAndRedirect();
                } else {
                    const err = await response.json();
                    errorDiv.innerText = err.detail || 'Login yoki parol xato';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'Serverga bog\'lanishda xatolik';
                errorDiv.classList.remove('hidden');
            }
        };
    </script>
</body>

</html>
