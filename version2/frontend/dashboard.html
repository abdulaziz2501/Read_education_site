<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Profilim | READ EDUCATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        dark: '#0F172A',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-slate-50 font-['Inter']">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <img src="/static/images/logo.png" class="h-10 w-auto" alt="Logo">
                    <span class="font-['Outfit'] font-bold text-xl text-dark">DASHBOARD</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userName" class="text-sm font-medium text-slate-600"></span>
                    <button onclick="auth.logout()"
                        class="text-sm font-medium text-red-600 hover:text-red-700">Chiqish</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar / Stats -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="text-center">
                        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="ph ph-user text-3xl text-primary"></i>
                        </div>
                        <h2 id="fullName" class="text-xl font-bold text-dark"></h2>
                        <p id="userRole" class="text-sm text-slate-500 capitalize"></p>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Certificates Section -->
                <div>
                    <h3 class="text-xl font-bold text-dark mb-4 flex items-center gap-2">
                        <i class="ph ph-certificate text-primary"></i> Mening Sertifikatlarim
                    </h3>
                    <div id="certificatesList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Loaded via JS -->
                        <div
                            class="col-span-full border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center text-slate-400">
                            Sertifikatlar yuklanmoqda...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await auth.checkAuthAndRedirect();
            if (user) {
                document.getElementById('userName').innerText = user.username;
                document.getElementById('fullName').innerText = user.full_name;
                document.getElementById('userRole').innerText = user.role === 'admin' ? 'Administrator' : 'Talaba';

                loadCertificates();
            }
        });

        async function loadCertificates() {
            const response = await auth.fetchWithAuth('/api/student/certificates');
            if (response.ok) {
                const certs = await response.json();
                const list = document.getElementById('certificatesList');

                if (certs.length === 0) {
                    list.innerHTML = `<div class="col-span-full bg-white p-10 rounded-2xl border border-slate-100 text-center">
                        <i class="ph ph-info text-3xl text-slate-300 mb-2"></i>
                        <p class="text-slate-500">Sizda hali sertifikatlar yo'q.</p>
                    </div>`;
                    return;
                }

                list.innerHTML = certs.map(c => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all group">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center">
                                <i class="ph ph-medal text-2xl text-green-600"></i>
                            </div>
                            <span class="text-xs font-mono text-slate-400">#${c.certificate_id}</span>
                        </div>
                        <h4 class="font-bold text-dark mb-1">${c.course.name}</h4>
                        <p class="text-sm text-slate-500 mb-4">${new Date(c.issue_date).toLocaleDateString('uz-UZ')}</p>
                        <a href="/certificate/${c.certificate_id}" target="_blank" class="w-full inline-flex items-center justify-center gap-2 py-2.5 bg-slate-50 text-dark text-sm font-semibold rounded-lg hover:bg-primary hover:text-white transition-all">
                            <i class="ph ph-eye"></i> Ko'rish
                        </a>
                    </div>
                `).join('');
            }
        }
    </script>
</body>

</html>
